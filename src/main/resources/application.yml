server:
  port: ${SERVER_PORT:8080}
  tomcat:
    mbeanregistry:
      enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: pms-order
    distribution:
      percentiles-histogram:
        http.server.requests: true
        hikaricp.connections.acquire: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        default_batch_fetch_size: 100
      jakarta.persistence.lock.timeout: 3000
    open-in-view: false

  rabbitmq:
    host: ${RABBIT_HOST}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USERNAME}
    password: ${RABBIT_PASSWORD}
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 2
        max-concurrency: 8
        prefetch: 10
        default-requeue-rejected: false
        retry:
          enabled: false

order:
  cancel:
    allowed-hours: 1
    allow-partial: true
    max-items-per-request: 50

consumer:
  simulation:
    enabled: true
    failure-rate: 0.005
    delay:
      order-created:
        min-ms: 50
        max-ms: 150
      order-paid:
        min-ms: 100
        max-ms: 300
      order-cancelled:
        min-ms: 50
        max-ms: 200
