services:
  nginx:
    image: nginx:alpine
    container_name: pms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app-network
    depends_on:
      - blue
      - green
    restart: unless-stopped

  blue:
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: pms-blue
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-staging}
      - SERVER_PORT=8087
    expose:
      - "8087"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8087/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  green:
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: pms-green
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-staging}
      - SERVER_PORT=8088
    expose:
      - "8088"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  app-network:
    driver: bridge
