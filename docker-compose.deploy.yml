services:
  nginx:
    image: nginx:alpine
    container_name: pms-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app-network
    depends_on:
      - blue
      - green
    restart: unless-stopped
    labels:
      - "autoheal=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  blue:
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: pms-blue
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-staging}
      - SERVER_PORT=8087
    expose:
      - "8087"
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "autoheal=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8087/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  green:
    image: ${ECR_REPO}:${IMAGE_TAG:-latest}
    container_name: pms-green
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-staging}
      - SERVER_PORT=8088
    expose:
      - "8088"
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "autoheal=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: pms-autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10
      - AUTOHEAL_START_PERIOD=0
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=15
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  app-network:
    driver: bridge
