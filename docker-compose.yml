# 로컬 개발용 인프라(PostgreSQL + RabbitMQ) 전용 compose.
# 운영(EC2 nginx + blue/green) 배포는 docker-compose.deploy.yml 사용.
version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: pms_order
      POSTGRES_USER: pms
      POSTGRES_PASSWORD: pms1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
